<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>R.H.S</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<!-- FUNDO MATRIX -->

<canvas id="matrix"></canvas>

<div class="blur-bg b1"></div>
<div class="blur-bg b2"></div>
<div class="blur-bg b3"></div>



<!-- TELA DE ENTRADA -->


<section id="welcome">


<div class="welcome-card">


<img src="img/logo.png" class="logo">


<h1>
R.H.S
</h1>


<p>
Conectando comunidades, canais e parceiros
</p>



<button id="entrar">
ENTRAR
</button>


</div>


</section>





<!-- MUSICA -->


<audio id="music" loop>

<source src="audio/music.mp3" type="audio/mp3">

</audio>







<!-- SITE PRINCIPAL -->


<div id="site">



<header class="top">


<img src="img/logo.png" class="logo">


<h1>
R.H.S
</h1>


<p>
Sistema de comunidades premium
</p>



<a href="#" class="main-button">

Canal Oficial

</a>


</header>









<!-- ESTATISTICAS -->


<section class="stats">


<div class="stat">

<h2 id="totalComunidades">
0
</h2>

<p>
Comunidades
</p>

</div>



<div class="stat">

<h2 id="totalAliados">
0
</h2>

<p>
Aliados
</p>

</div>



<div class="stat">

<h2 id="totalParceiros">
0
</h2>

<p>
Parceiros
</p>

</div>



</section>









<!-- EXPLORAR -->


<section class="explorar">



<h2>
Explorar R.H.S
</h2>



<input 
id="pesquisa"
placeholder="Pesquisar comunidades..."
>




<div class="filtros">


<button onclick="filtrar('todos')">
🌐 Todos
</button>


<button onclick="filtrar('grupo')">
👥 Grupos
</button>


<button onclick="filtrar('canal')">
📢 Canais
</button>


<button onclick="filtrar('aliado')">
⭐ Aliados
</button>



</div>







<div id="comunidades" class="cards">


</div>




</section>









<!-- PARCEIROS -->


<section class="parceiros">


<h2>
⭐ Parceiros R.H.S
</h2>


<p>
Parceiros oficiais da plataforma
</p>



<div id="parceiros" class="cards">


</div>


</section>









<!-- PARCERIA -->


<section class="parceria">



<h2>
🤝 Fazer Parceria
</h2>



<div class="partner-box">



<select id="admSelect">

</select>





<textarea id="mensagemParceria">

Olá, vim pela R.H.S e quero fazer parceria.

</textarea>





<button id="whatsapp">

Enviar WhatsApp

</button>




</div>


</section>









<footer>


<p>
© 2026 R.H.S
</p>


</footer>




</div>









<script src="config.js"></script>

<script src="script.js"></script>


</body>

</html>

<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>R.H.S</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<!-- FUNDO -->

<canvas id="matrix"></canvas>


<div class="blur-bg b1"></div>
<div class="blur-bg b2"></div>
<div class="blur-bg b3"></div>



<!-- ENTRADA -->


<section id="welcome">


<div class="welcome-card">


<img src="img/logo.png" class="logo">


<h1>
R.H.S
</h1>


<p class="typing">
Sistema oficial de grupos, canais e parceiros
</p>


<button id="entrar">
ENTRAR
</button>


</div>


</section>





<audio id="music" loop>

<source src="audio.mp3">

</audio>






<!-- SITE -->


<div id="site">





<header>


<img src="img/logo.png" class="logo">


<h1>
R.H.S
</h1>


<p>
Conectando comunidades e parceiros
</p>



<a href="#" class="main-button">
Canal Oficial
</a>


</header>






<!-- NUMEROS -->


<section class="stats">


<div class="stat">

<h2 id="totalGrupos">
0
</h2>

<p>
Grupos
</p>

</div>




<div class="stat">

<h2 id="totalCanais">
0
</h2>

<p>
Canais
</p>

</div>





<div class="stat premium">

<h2 id="totalAliados">
0
</h2>

<p>
Aliados
</p>

</div>



</section>








<!-- GRUPOS -->


<section class="area">


<h2>
👥 Grupos
</h2>


<div id="grupos" class="cards">

</div>


</section>








<!-- CANAIS -->


<section class="area">


<h2>
📢 Canais
</h2>


<div id="canais" class="cards">

</div>


</section>







<!-- ALIADOS -->


<section class="aliados">


<h2>
⭐ Aliados Premium
</h2>


<p>
Parceiros oficiais R.H.S
</p>


<div id="aliados" class="cards">

</div>



</section>








<!-- PARCERIA -->


<section class="parceria">


<h2>
🤝 Fazer Parceria
</h2>



<div class="partner-box">



<select id="admSelect">

</select>




<textarea id="mensagemParceria">

Olá, vim pela R.H.S e quero fazer parceria.

</textarea>




<button id="whatsapp">

Enviar WhatsApp

</button>



</div>


</section>







<footer>

<p>
© 2026 R.H.S
</p>

</footer>




</div>






<script src="config.js"></script>

<script src="script.js"></script>


</body>

</html>

<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>R.H.S ADM</title>


<link rel="stylesheet" href="admin.css">

</head>


<body>



<div id="login" class="box">


<h1>
R.H.S
</h1>


<p>
Painel Administrativo
</p>



<input

id="senha"

type="password"

placeholder="Senha"

>



<button onclick="entrarADM()">

Entrar

</button>



</div>









<div id="painel" style="display:none;">





<header>


<h1>
R.H.S ADM
</h1>


<p>
Gerenciar plataforma
</p>


</header>









<section class="box">


<h2>
➕ Nova Comunidade
</h2>



<select id="tipo">


<option value="grupo">

👥 Grupo

</option>


<option value="canal">

📢 Canal

</option>


</select>








<input

id="nome"

placeholder="Nome da comunidade"

>








<input

id="imagem"

placeholder="URL da foto"

>








<input

id="link"

placeholder="Link da comunidade"

>








<select id="categoria">


<option value="amizade">

🤝 Amizade

</option>


<option value="jogos">

🎮 Jogos

</option>


<option value="programacao">

💻 Programação

</option>


<option value="divulgacao">

📢 Divulgação

</option>


<option value="outros">

🌐 Outros

</option>



</select>








<textarea

id="descricao"

placeholder="Descrição"

></textarea>








<button onclick="salvarComunidade()">

Publicar

</button>



</section>









<section class="box">


<h2>
⭐ Novo Aliado
</h2>



<input

id="aliadoNome"

placeholder="Nome"

>



<input

id="aliadoImagem"

placeholder="URL da foto"

>



<input

id="aliadoLink"

placeholder="Link"

>



<textarea

id="aliadoDesc"

placeholder="Descrição"

></textarea>




<button onclick="salvarAliado()">

Salvar Aliado

</button>



</section>









<section class="box">


<h2>
🤝 ADM Parceria
</h2>




<input

id="admNome"

placeholder="Nome do ADM"

>




<input

id="admNumero"

placeholder="WhatsApp com DDI"

>




<button onclick="addADM()">

Salvar ADM

</button>



</section>









<section class="box">


<h2>
📦 Publicados
</h2>


<div id="listaAdmin">

</div>


</section>









<button class="exit" onclick="sair()">

Sair

</button>





</div>









<script src="admin.js"></script>


</body>

</html>

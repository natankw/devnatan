<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>R.H.S ADM</title>

<link rel="stylesheet" href="admin.css">

</head>


<body>



<div id="login" class="box">


<h1>
R.H.S
</h1>


<p>
Painel Administrativo
</p>


<input 
id="senha"
type="password"
placeholder="Senha"
>


<button onclick="entrarADM()">
Entrar
</button>


</div>







<div id="painel" style="display:none;">



<header>

<h1>
R.H.S ADM
</h1>

<p>
Gerencie o catálogo
</p>

</header>








<section class="box">


<h2>
➕ Adicionar Item
</h2>



<select id="tipo">


<option value="grupos">
👥 Grupo
</option>


<option value="canais">
📢 Canal
</option>


<option value="aliados">
⭐ Aliado
</option>


</select>







<input 
id="nome"
placeholder="Nome"
>





<select id="categoria">

<option value="amizade">
🤝 Amizade
</option>

<option value="jogos">
🎮 Jogos
</option>

<option value="programacao">
💻 Programação
</option>

<option value="divulgacao">
📢 Divulgação
</option>

<option value="outros">
🌐 Outros
</option>

</select>


<input 
id="link"
placeholder="Link WhatsApp/Site"
>


<textarea 
id="descricao"
placeholder="Descrição"
></textarea>



<button onclick="salvarItem()">

Publicar

</button>



</section>








<section class="box">


<h2>
🤝 ADM Parceria
</h2>



<input 
id="admNome"
placeholder="Nick do ADM"
>



<input 
id="admNumero"
placeholder="WhatsApp"
>




<button onclick="addADM()">

Salvar ADM

</button>


</section>








<section class="box">


<h2>
📦 Itens publicados
</h2>



<div id="listaAdmin">


</div>



</section>







<button onclick="sair()" class="exit">

Sair

</button>




</div>






<script src="admin.js"></script>


</body>

</html>

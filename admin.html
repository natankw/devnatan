<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>R.H.S ADM</title>

<link rel="stylesheet" href="admin.css">

</head>


<body>


<div class="login" id="login">


<h1>
R.H.S ADM
</h1>


<input id="senha" type="password" placeholder="Senha">


<button onclick="entrarADM()">
Entrar
</button>


</div>





<div id="painel" style="display:none;">



<h1>
Painel R.H.S
</h1>





<section>


<h2>
Adicionar Grupo
</h2>


<input id="gNome" placeholder="Nome">


<input id="gLink" placeholder="Link">


<input id="gDesc" placeholder="Descrição">


<button onclick="addGrupo()">
Adicionar
</button>


</section>







<section>


<h2>
Adicionar Canal
</h2>


<input id="cNome" placeholder="Nome">


<input id="cLink" placeholder="Link">


<input id="cDesc" placeholder="Descrição">


<button onclick="addCanal()">
Adicionar
</button>


</section>







<section>


<h2>
Adicionar Aliado ⭐
</h2>


<input id="aNome" placeholder="Nome">


<input id="aLink" placeholder="Link">


<input id="aDesc" placeholder="Descrição">


<button onclick="addAliado()">
Adicionar
</button>


</section>







<section>


<h2>
ADM de Parceria
</h2>



<input id="admNome" placeholder="Nick do ADM">


<input id="admNumero" placeholder="Número WhatsApp">


<button onclick="addADM()">
Salvar ADM
</button>



</section>







<button onclick="sair()">

Sair

</button>



</div>





<script src="admin.js"></script>


</body>

</html>

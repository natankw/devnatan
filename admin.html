<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>R.H.S ADM</title>

<link rel="stylesheet" href="admin.css">

</head>


<body>



<div class="blur"></div>



<div id="login" class="box">


<h1>
R.H.S
</h1>


<p>
Painel Administrativo
</p>



<input 
id="senha"
type="password"
placeholder="Senha de acesso"
>



<button onclick="entrarADM()">
Entrar
</button>



</div>







<div id="painel" style="display:none;">



<header>


<h1>
R.H.S ADM
</h1>


<p>
Gerenciamento do sistema
</p>


</header>







<section class="box">


<h2>
👥 Novo Grupo
</h2>


<input id="gNome" placeholder="Nome do grupo">


<input id="gLink" placeholder="Link WhatsApp">


<input id="gDesc" placeholder="Descrição">



<button onclick="addGrupo()">
Salvar Grupo
</button>



</section>









<section class="box">


<h2>
📢 Novo Canal
</h2>



<input id="cNome" placeholder="Nome do canal">


<input id="cLink" placeholder="Link do canal">


<input id="cDesc" placeholder="Descrição">



<button onclick="addCanal()">
Salvar Canal
</button>



</section>









<section class="box">


<h2>
⭐ Novo Aliado
</h2>



<input id="aNome" placeholder="Nome do aliado">


<input id="aLink" placeholder="Link">


<input id="aDesc" placeholder="Descrição">



<button onclick="addAliado()">
Salvar Aliado
</button>



</section>









<section class="box">


<h2>
🤝 ADM Parceria
</h2>



<input id="admNome" placeholder="Nick do ADM">


<input id="admNumero" placeholder="Número WhatsApp">



<button onclick="addADM()">
Salvar ADM
</button>



</section>







<button onclick="sair()" class="exit">

Sair

</button>



</div>





<script src="admin.js"></script>


</body>

</html>
